model:
  backbone: "google/vit-base-patch16-224"  # or vit-large-patch16-224
  num_classes_per_attribute:
    mobility: 3
    orientation: 3
    occlusion: 3
    lighting: 3
    size: 3
    posture: 3
    group: 3
    attention: 3
  dropout: 0.1
  freeze_backbone_layers: 6  # freeze first N transformer blocks

training:
  dataset_path: "/data/bdd100k"
  dataset_format: "bdd100k"  # bdd100k | nuscenes | coco
  image_size: 224
  batch_size: 32
  num_workers: 4
  num_epochs: 20
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  gradient_clip: 1.0
  mixed_precision: true
  seed: 42

  # class weights per attribute for imbalanced categories
  use_class_weights: true

  # train/val/test split if no predefined split
  val_split: 0.15
  test_split: 0.10

augmentation:
  random_horizontal_flip: 0.5
  random_crop_scale: [0.8, 1.0]
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
    hue: 0.05
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

logging:
  experiment_name: "vit-attribute-classifier"
  run_name: null  # auto-generated if null
  log_every_n_steps: 50
  eval_every_n_epochs: 1
  save_top_k: 3
  mlflow_tracking_uri: "http://localhost:5000"

output:
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"
